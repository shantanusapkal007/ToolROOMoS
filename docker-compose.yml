version: '3.8'

services:
  # PostgreSQL Database (The Digital Twin)
  postgres:
    image: postgres:15-alpine
    container_name: toolroomos-postgres
    environment:
      POSTGRES_USER: root
      POSTGRES_PASSWORD: rootpassword
      POSTGRES_DB: toolroomos
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

  # Redis (Queues & Caching)
  redis:
    image: redis:7-alpine
    container_name: toolroomos-redis
    ports:
      - "6380:6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped

  # MinIO (S3-Compatible Object Storage)
  minio:
    image: minio/minio
    container_name: toolroomos-minio
    environment:
      MINIO_ROOT_USER: admin
      MINIO_ROOT_PASSWORD: adminpassword
    ports:
      - "9000:9000" # API Port
      - "9001:9001" # Console Port
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
  minio_data:
